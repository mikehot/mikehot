    <path d="M54 94H206M54 132H168M54 170H190" stroke="#FFFFFF" stroke-opacity="0.62" stroke-width="10" stroke-linecap="round"/>
    <path d="M78 58H182M78 206H182" stroke="#D9FF5A" stroke-width="8" stroke-linecap="round"/>
    <circle cx="214" cy="46" r="10" fill="#D9FF5A"/>
    <circle cx="46" cy="214" r="10" fill="#D9FF5A"/>
