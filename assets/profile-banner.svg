    <text x="92" y="98" fill="#050505" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1">2015-NOW</text>
  </g>
  <text x="70" y="176" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="900" letter-spacing="0">JACKY CHOU</text>
  <text x="74" y="224" fill="#D6D6D6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Flutter / Android / Java Backend / AI Engineering</text>
  <text x="74" y="264" fill="#A1A1AA" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">Mobile business systems, RAG knowledge bases, MCP/Agent workflows, and delivery evidence.</text>
  <g transform="translate(74 310)">
    <rect width="128" height="38" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
