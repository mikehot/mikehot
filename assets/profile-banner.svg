    <rect x="144" width="128" height="38" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="164" y="24" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">ANDROID</text>
    <rect x="288" width="128" height="38" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="318" y="24" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">JAVA</text>
    <rect x="432" width="128" height="38" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="462" y="24" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">RAG</text>
    <rect x="576" width="128" height="38" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="604" y="24" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">MCP</text>
